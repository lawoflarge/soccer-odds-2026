name: WorldCup2026Odds
options:
  bundleIdPrefix: com.lawoflarge
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.0.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      CODE_SIGNING_ALLOWED: "NO"
targets:
  WorldCup2026Odds:
    type: application
    platform: iOS
    sources:
      - path: WorldCup2026Odds
    info:
      path: WorldCup2026Odds/Info.plist
      properties:
        CFBundleDisplayName: World Cup 2026 Odds
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        GADApplicationIdentifier: ca-app-pub-6563643868702361~1733904595
        NSUserTrackingUsageDescription: "We use your data to show more relevant ads. This keeps the app free."
        ITSAppUsesNonExemptEncryption: false
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lawoflarge.worldcup2026odds
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Release:
          CODE_SIGNING_ALLOWED: "YES"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: R95M36AU2X
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "WorldCup2026Odds ios_app_store 1780260189"
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
  WorldCup2026OddsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WorldCup2026OddsTests
      - path: WorldCup2026Odds/Resources/sample-predictions.json
        buildPhase: resources
    dependencies:
      - target: WorldCup2026Odds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lawoflarge.worldcup2026oddsTests
        CODE_SIGNING_ALLOWED: "NO"
